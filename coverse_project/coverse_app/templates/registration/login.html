<!-- templates/registration/login.html -->
{% extends 'coverse_app/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2>Вход</h2>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="{{ form.username.id_for_label }}" class="form-label">Имя пользователя</label>
                {{ form.username }}
            </div>
            <div class="mb-3">
                <label for="{{ form.password.id_for_label }}" class="form-label">Пароль</label>
                {{ form.password }}
            </div>
            {% if form.errors %}
                <div class="alert alert-danger">
                    Неверное имя пользователя или пароль.
                </div>
            {% endif %}
            <button type="submit" class="btn btn-primary">Войти</button>
            <a href="{% url 'register' %}" class="btn btn-link">Нет аккаунта? Зарегистрируйтесь</a>
        </form>
    </div>
</div>
{% endblock %}
