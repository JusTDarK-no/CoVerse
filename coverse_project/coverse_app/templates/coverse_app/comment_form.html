<!-- templates/coverse_app/comment_form.html -->
{% extends 'coverse_app/base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="card">
        <div class="card-header">
            <h4>{{ title }}</h4>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label for="{{ form.content.id_for_label }}" class="form-label">
                        {{ form.content.label }}
                    </label>
                    {{ form.content }}
                    {% if form.content.errors %}
                        <div class="text-danger mt-1">
                            {% for error in form.content.errors %}
                                {{ error }}
                            {% endfor %}
                        </div>
                    {% endif %}
                </div>

                <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                    <a href="{% url 'coverse_app:post_comments' post.pk %}" class="btn btn-secondary">Отмена</a>
                    <button type="submit" class="btn btn-primary">Отправить</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
