{% extends 'coverse_app/base.html' %}

{% block content %}
<h1>Создать раздел</h1>

<form method="post">
    {% csrf_token %}
    <div class="mb-3">
        <label for="{{ form.title.id_for_label }}" class="form-label">Заголовок раздела</label>
        {{ form.title }}
    </div>
    <div class="mb-3">
        <label for="{{ form.section_type.id_for_label }}" class="form-label">Тип раздела</label>
        {{ form.section_type }}
    </div>
    <div class="mb-3">
        <label for="{{ form.description.id_for_label }}" class="form-label">Описание (опционально)</label>
        {{ form.description }}
    </div>
    <div class="mb-3">
        <label for="{{ form.order.id_for_label }}" class="form-label">Порядок (число)</label>
        {{ form.order }}
        <div class="form-text">Разделы сортируются по возрастанию.</div>
    </div>
    <button type="submit" class="btn btn-primary">Создать раздел</button>
    <a href="{% url 'coverse_app:project_detail' project.pk %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
