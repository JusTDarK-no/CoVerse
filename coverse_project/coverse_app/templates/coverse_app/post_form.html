<!-- post_form.html -->
{% extends 'coverse_app/base.html' %}

{% block content %}
<h1>{% if object %}Редактировать пост{% else %}Создать пост{% endif %}</h1>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}

    <div class="mb-3">
        <label for="{{ form.title.id_for_label }}" class="form-label">Заголовок</label>
        {{ form.title }}
    </div>

    <div class="mb-3">
        <label for="{{ form.content.id_for_label }}" class="form-label">Содержание</label>
        <textarea name="{{ form.content.name }}" class="form-control" rows="8">{{ form.content.value }}</textarea>
    </div>

    <div class="mb-3">
        <label for="{{ form.status.id_for_label }}" class="form-label">Статус</label>
        {{ form.status }}
    </div>

    <!-- Поле для изображений -->
    <div class="mb-3">
        <label class="form-label">Изображения (до 5)</label>
        <input type="file" name="images" multiple accept="image/*" class="form-control">
        <div class="form-text">Можно выбрать до 5 изображений (только JPG, PNG, GIF)</div>
    </div>

    <button type="submit" class="btn btn-primary">
        {% if object %}Сохранить{% else %}Создать{% endif %}
    </button>
    <a href="{% url 'coverse_app:section_detail' section.pk %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
