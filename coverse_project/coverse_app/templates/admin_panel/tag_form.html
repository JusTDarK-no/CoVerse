<!-- templates/admin_panel/tag_form.html -->
{% extends 'admin_panel/base.html' %}

{% block admin_title %}{{ title }}{% endblock %}

{% block admin_content %}
<form method="post">
    {% csrf_token %}
    <div class="mb-3">
        <label for="{{ form.name.id_for_label }}" class="form-label">Название тега</label>
        {{ form.name }}
        {% if form.name.errors %}
            <div class="text-danger">{{ form.name.errors }}</div>
        {% endif %}
    </div>
    <button type="submit" class="btn btn-primary">Сохранить</button>
    <a href="{% url 'admin_panel:admin_tags' %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
